<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Personal Lifts">
<meta name="theme-color" content="#000000">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Personal Lifts</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --accent: #9a9a9a;
  --bg: #000;
  --card: #0f0f0f;
  --border: #222;
  --border2: #181818;
  --text: #fff;
  --muted: rgba(255,255,255,0.45);
  --dim: rgba(255,255,255,0.18);
  --font-h: 'Bebas Neue', sans-serif;
  --font-b: 'Outfit', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
a, a:visited, a:active { color: inherit; text-decoration: none; -webkit-text-fill-color: inherit; }
a[href^="tel:"], a[href^="sms:"], a[href^="mailto:"],
a[x-apple-data-detectors], a[x-apple-data-detectors] *,
a[href^="x-apple-data-detectors:"], a[href^="x-apple-data-detectors:"] * {
  color: inherit !important; text-decoration: none !important;
  -webkit-text-fill-color: inherit !important;
  pointer-events: none !important;
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-b); -webkit-text-size-adjust: 100%; accent-color: #fff; caret-color: #fff; }
body { -webkit-text-fill-color: var(--text); }
input, select, textarea, button { -webkit-text-fill-color: currentColor; caret-color: #fff; accent-color: #fff; }
::selection { background: rgba(255,255,255,0.25); color: #fff; -webkit-text-fill-color: #fff; }
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active,
select:-webkit-autofill,
textarea:-webkit-autofill {
  -webkit-text-fill-color: var(--text) !important;
  -webkit-box-shadow: 0 0 0 1000px #181818 inset !important;
  box-shadow: 0 0 0 1000px #181818 inset !important;
  caret-color: #fff !important;
  transition: background-color 5000s ease-in-out 0s;
}
#root { min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; }
input, select {
  background: #181818; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: var(--font-b); font-size: 14px;
  padding: 8px 10px; outline: none; transition: border-color 0.15s;
}
input:focus, select:focus { border-color: var(--accent); }
input::placeholder { color: var(--dim); }
input:disabled, select:disabled { opacity: 0.4; cursor: not-allowed; }
select option { background: #181818; }
input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
button { font-family: var(--font-b); cursor: pointer; color: var(--text); }
.logo-bar {
  background: #000; border-bottom: 1px solid var(--border);
  padding: 10px 1rem; display: flex; align-items: flex-end;
}
.logo-wordmark { font-family: var(--font-h); font-size: 30px; letter-spacing: 3px; line-height: 1; color: #fff; user-select: none; }
.logo-wordmark span { color: var(--accent); }
.logo-sub { font-size: 9px; color: var(--dim); letter-spacing: 4px; text-transform: uppercase; font-weight: 300; margin-bottom: 3px; }
.topbar { display: flex; align-items: center; gap: 10px; padding: 1rem 1rem 0.25rem; }
.page-title { font-family: var(--font-h); font-size: 24px; letter-spacing: 2px; color: #fff; flex: 1; }
.back-btn { background: none; border: none; color: var(--muted); font-size: 20px; padding: 4px 2px; line-height: 1; transition: color 0.15s; }
.back-btn:hover { color: #fff; }
.screen { padding: 1rem 1rem 2rem; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  padding: 9px 16px; font-size: 12px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text); transition: all 0.15s;
}
.btn:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.04); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #111; }
.btn-primary:hover { background: #b5b5b5; border-color: #b5b5b5; }
.btn-sm { padding: 5px 11px; font-size: 11px; }
.btn-danger { border-color: rgba(255,255,255,0.25); color: #cfcfcf; }
.btn-danger:hover { background: rgba(255,255,255,0.06); }
.btn-ghost { border-color: transparent; color: var(--muted); }
.btn-ghost:hover { color: #fff; background: transparent; }
.btn-ghost:disabled { opacity: 0.25; }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.875rem; overflow: hidden; }
.card-head { padding: 0.875rem 1rem; border-bottom: 1px solid var(--border2); display: flex; align-items: center; gap: 8px; }
.card-head-label { font-family: var(--font-h); font-size: 18px; letter-spacing: 1.5px; flex: 1; color: #fff; }
.col-labels { display: grid; padding: 6px 1rem 3px; gap: 6px; }
.col-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }
.set-row { display: grid; gap: 6px; padding: 8px 1rem; align-items: center; border-bottom: 1px solid var(--border2); }
.set-row:last-child { border-bottom: none; }
.section-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 2.5px; font-weight: 500; margin-bottom: 0.75rem; }
.chip { display: inline-flex; align-items: center; padding: 3px 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 4px; font-size: 10px; color: #d0d0d0; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.chip-dim { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: var(--muted); }
.plain-input { background: none; border: none; outline: none; color: var(--text); font-family: var(--font-b); font-size: 14px; font-weight: 500; padding: 0; width: 100%; }
.plain-input-head { background: none; border: none; outline: none; color: #fff; font-family: var(--font-h); font-size: 18px; letter-spacing: 1.5px; padding: 0; width: 100%; }
.big-input { width: 100%; background: #181818; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-b); font-size: 15px; font-weight: 500; padding: 12px 14px; outline: none; margin-bottom: 1.25rem; }
.big-input:focus { border-color: var(--accent); }
.big-input::placeholder { color: var(--dim); }
.prog-btn { display: block; width: 100%; text-align: left; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 0.625rem; transition: border-color 0.15s; color: var(--text); }
.prog-btn:hover { border-color: var(--accent); }
.day-block { margin-bottom: 1.5rem; }
.day-head { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
.empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }
.empty-state h2 { font-family: var(--font-h); font-size: 36px; letter-spacing: 3px; color: #fff; margin-bottom: 0.625rem; }
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--accent); color: #111; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; z-index: 999; white-space: nowrap; pointer-events: none; animation: slideUp 0.2s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1rem; }
.mono { font-variant-numeric: tabular-nums; }
.grp { border: 1px solid rgba(255,255,255,0.22); border-radius: 12px; padding: 0.625rem; margin-bottom: 0.875rem; background: rgba(255,255,255,0.03); }
.grp-head { display: flex; align-items: center; gap: 8px; margin: 0.125rem 0.25rem 0.625rem; }
.grp .card { margin-bottom: 0.625rem; }
.grp .card:last-child { margin-bottom: 0; }
.ex-tag { font-family: var(--font-h); font-size: 15px; letter-spacing: 1px; color: var(--accent); flex-shrink: 0; }
.blk-head { padding: 0.625rem 0.75rem; border-bottom: 1px solid var(--border2); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.timed-row { display: flex; gap: 8px; padding: 0.875rem 1rem; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ╔══════════════════════════════════════════════════╗
// ║  STEP 1: Paste your Supabase values here         ║
// ╚══════════════════════════════════════════════════╝
const SUPABASE_URL      = 'https://qlvpphbshzmzybimyuee.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsdnBwaGJzaHptenliaW15dWVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTI5NTksImV4cCI6MjA5NDc2ODk1OX0.Rq_JOF4t-LYD92H5HnA5O6O3BhhxQ7jW1DOCBg4w1Kk';
const ADMIN_PASSWORD    = 'Ple@se.Let.Me.In.21';
// ════════════════════════════════════════════════════

const { useState, useEffect, useRef } = React;
const sb  = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const uid = () => Math.random().toString(36).slice(2, 9);

// ── Data model ────────────────────────────────────────────────────────────────
// program.days = [ { id, name, blocks:[ block ] } ]
// block.type ∈ warmup | solo | superset | triset | cooldown
//   warmup / cooldown have a `mode`:
//     'timed'    → an activity + duration (e.g. "Bike — 10 min")
//     'exercise' → a normal exercise with sets
//   exercise count per type: solo=1, superset=2, triset=3, warmup/cooldown=1
// exercise = { id, name, unit, sets:[ { id, reps, tempo, rpe } ] }
//   set #, reps, tempo, RPE are set by the ADMIN.
//   RIR + weight are entered by the ATHLETE in the viewer and saved to
//   localStorage (never written back to Supabase).
// Days are persisted in the existing `exercises` JSONB column — no schema change.
const BTYPES  = ["warmup","solo","superset","triset","cooldown"];
const BLABEL  = { warmup:"Warm Up", solo:"Solo", superset:"Superset", triset:"Triset", cooldown:"Cool Down" };
const EXCOUNT = { warmup:1, solo:1, superset:2, triset:3, cooldown:1 };

const mkSet = (p) => ({ id:uid(), reps:(p&&p.reps!=null)?p.reps:8, tempo:(p&&p.tempo)||"3010", rpe:(p&&p.rpe!=null)?String(p.rpe):"" });
const mkEx  = (p) => ({
  id:(p&&p.id)||uid(),
  name:(p&&p.name)||"",
  unit:(p&&p.unit)||(p&&p.sets&&p.sets[0]&&p.sets[0].unit)||"kg",
  sets:(p&&p.sets&&p.sets.length)?p.sets.map(mkSet):[mkSet()],
});
function fitEx(list, n) {
  const a = (list||[]).map(mkEx);
  while (a.length < n) a.push(mkEx());
  return a.slice(0, n);
}
const mkBlock = (type) => {
  type = BTYPES.includes(type) ? type : "solo";
  const wc = type==="warmup" || type==="cooldown";
  const mode = wc ? "timed" : "exercise";
  return { id:uid(), type, mode, activity:"", duration:"", exercises: mode==="timed" ? [] : fitEx([], EXCOUNT[type]) };
};
function normBlock(b) {
  b = b || {};
  const type = BTYPES.includes(b.type) ? b.type : "solo";
  const wc = type==="warmup" || type==="cooldown";
  const mode = wc ? (b.mode==="exercise" ? "exercise" : "timed") : "exercise";
  return {
    id: b.id || uid(),
    type, mode,
    activity: b.activity || "",
    duration: b.duration || "",
    exercises: mode==="timed" ? [] : fitEx(b.exercises, EXCOUNT[type]),
  };
}
function normalizeBlocks(d) {
  if (Array.isArray(d.blocks))    return d.blocks.map(normBlock);
  if (Array.isArray(d.exercises)) return d.exercises.map(e => normBlock({ type:"solo", mode:"exercise", exercises:[e] }));
  return [];
}
// Wraps legacy data (flat exercise list, or days with `exercises`) into the new
// day → blocks shape so old and new programs both render.
function normalizeDays(p) {
  const raw = Array.isArray(p.days) ? p.days
            : Array.isArray(p.exercises) ? p.exercises : [];
  let days;
  if (raw.length && raw[0] && (Array.isArray(raw[0].blocks) || Array.isArray(raw[0].exercises))) days = raw;          // already days
  else if (raw.length) days = [{ id: uid(), name: "Day 1", exercises: raw }];                                         // legacy flat list
  else days = [];
  return days.map(d => ({ id: d.id || uid(), name: d.name || "", blocks: normalizeBlocks(d) }));
}
function programStats(p) {
  const days = p.days || [];
  let ex = 0, sets = 0;
  days.forEach(d => (d.blocks||[]).forEach(b => (b.exercises||[]).forEach(e => { ex++; sets += (e.sets||[]).length; })));
  return { days: days.length, ex, sets };
}
function dayExCount(d) {
  return (d.blocks||[]).reduce((a,b) => a + (b.exercises||[]).length, 0);
}

// Athlete-entered RIR + weight, keyed by `<exId>-<setId>` → { r, w }.
function loadInputs(pid) {
  try { const v = localStorage.getItem('cx-u-' + pid); return v ? JSON.parse(v) : {}; } catch { return {}; }
}
function storeInputs(pid, m) {
  try { localStorage.setItem('cx-u-' + pid, JSON.stringify(m)); } catch {}
}
function shareUrl(id) {
  return window.location.origin + window.location.pathname + '#' + id;
}
function loadSession() {
  try { const v = localStorage.getItem('cx-session'); return v ? JSON.parse(v) : null; } catch { return null; }
}
function storeSession(u) {
  try {
    if (u) localStorage.setItem('cx-session', JSON.stringify(u));
    else localStorage.removeItem('cx-session');
  } catch {}
}
function copyToClipboard(text, cb) {
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(cb); }
  else { const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); cb(); }
}

function Logo({ onTripleTap }) {
  const count = useRef(0);
  const timer = useRef(null);
  const tap = () => {
    count.current += 1;
    clearTimeout(timer.current);
    if (count.current >= 3) { count.current = 0; onTripleTap(); }
    else { timer.current = setTimeout(() => { count.current = 0; }, 700); }
  };
  return (
    <div className="logo-bar">
      <div onClick={tap} style={{cursor:"default"}}>
        <div className="logo-wordmark">Personal Lifts</div>
      </div>
    </div>
  );
}
function BackBtn({ onClick }) { return <button className="back-btn" onClick={onClick}>←</button>; }
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

// ─── VIEWER: list ─────────────────────────────────────────────────────────────
function ViewerHome({ programs, loading, currentUser, onSelect, onAdminTap, onSignOut }) {
  return (
    <div className="app">
      <Logo onTripleTap={onAdminTap} />
      <div className="topbar">
        <span className="page-title" style={{fontSize:18}}>{(currentUser?.name||"").toUpperCase()}</span>
        <button className="btn btn-sm btn-ghost" onClick={onSignOut}>Sign out</button>
      </div>
      <div className="screen" style={{paddingTop:"0.875rem"}}>
        <p className="section-label">Programs</p>
        {loading ? <p style={{color:"var(--muted)",fontSize:14}}>Loading...</p>
        : programs.length === 0 ? (
          <div className="empty-state"><h2>No programs</h2><p style={{fontSize:14}}>Check back soon.</p></div>
        ) : programs.map(p => (
          <button key={p.id} className="prog-btn" onClick={() => onSelect(p)}>
            <p style={{fontFamily:"var(--font-h)",fontSize:20,letterSpacing:"1.5px",marginBottom:4}}>{p.name.toUpperCase()}</p>
            <p style={{fontSize:12,color:"var(--muted)"}}>
              {programStats(p).days} day{programStats(p).days!==1?"s":""} &nbsp;·&nbsp; {programStats(p).ex} exercise{programStats(p).ex!==1?"s":""}
            </p>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── VIEWER: one exercise card (athlete enters RIR + weight) ──────────────────
const VCOLS = "18px 40px 52px 38px 46px 1fr";
function ExCard({ ex, label, inputs, onIn }) {
  return (
    <div className="card">
      <div className="card-head">
        {label && <span className="ex-tag">{label}</span>}
        <span className="card-head-label">{(ex.name||"Exercise").toUpperCase()}</span>
      </div>
      <div className="col-labels" style={{gridTemplateColumns:VCOLS}}>
        {["#","Reps","Tempo","RPE","RIR","Weight"].map((h,i) => <span key={i} className="col-label">{h}</span>)}
      </div>
      {(ex.sets||[]).map((s, si) => {
        const k = ex.id+'-'+s.id, v = inputs[k] || {};
        return (
          <div key={s.id} className="set-row" style={{gridTemplateColumns:VCOLS}}>
            <span style={{fontSize:13,color:"var(--accent)",fontFamily:"var(--font-h)",letterSpacing:1}}>{si+1}</span>
            <span className="mono" style={{fontSize:13,color:"var(--muted)"}}>{s.reps}</span>
            <span className="mono" style={{fontSize:13,color:"var(--muted)"}}>{s.tempo||"—"}</span>
            <span className="mono" style={{fontSize:13,color:"var(--muted)"}}>{(s.rpe!=="" && s.rpe!=null) ? s.rpe : "—"}</span>
            <input className="mono" inputMode="numeric" value={v.r||""} maxLength={2}
              onChange={e => onIn(k, 'r', e.target.value.replace(/\D/g,'').slice(0,2))}
              placeholder="–" style={{width:42,padding:"5px 4px",fontSize:14,fontWeight:600,textAlign:"center"}} />
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              <input className="mono" inputMode="numeric" value={v.w||""} maxLength={4}
                onChange={e => onIn(k, 'w', e.target.value.replace(/\D/g,'').slice(0,4))}
                placeholder="—" style={{width:56,padding:"5px 5px",fontSize:14,fontWeight:600}} />
              <span style={{fontSize:10,color:"var(--muted)"}}>{ex.unit||"kg"}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── VIEWER: one block (timed / solo / superset / triset) ─────────────────────
function ViewBlock({ b, inputs, onIn }) {
  const wc = b.type==="warmup" || b.type==="cooldown";
  if (wc && b.mode==="timed") {
    return (
      <div className="card">
        <div className="card-head">
          <span className="card-head-label">{(b.activity||BLABEL[b.type]).toUpperCase()}</span>
          <span className="chip chip-dim">{BLABEL[b.type]}</span>
        </div>
        <div style={{padding:"0.875rem 1rem",fontSize:15,fontWeight:500}}>
          {b.duration ? b.duration : <span style={{color:"var(--muted)"}}>Duration not set</span>}
        </div>
      </div>
    );
  }
  if (b.type==="superset" || b.type==="triset") {
    return (
      <div className="grp">
        <div className="grp-head">
          <span className="chip">{BLABEL[b.type]}</span>
          <span style={{fontSize:10,color:"var(--muted)",letterSpacing:1,textTransform:"uppercase"}}>Alternate exercises</span>
        </div>
        {b.exercises.map((ex, i) => <ExCard key={ex.id} ex={ex} label={["A","B","C"][i]} inputs={inputs} onIn={onIn} />)}
      </div>
    );
  }
  return <ExCard ex={b.exercises[0] || { id:"x", sets:[] }} inputs={inputs} onIn={onIn} />;
}

// ─── VIEWER: program detail (days) ────────────────────────────────────────────
function ViewerProgram({ program, onBack, onAdminTap }) {
  const [inputs, setInputs] = useState(() => loadInputs(program.id));
  const [toast, setToast]   = useState(null);
  const [dayIdx, setDayIdx] = useState(null);
  const days = program.days || [];

  const handleIn = (k, field, val) => {
    const m = { ...inputs, [k]: { ...(inputs[k]||{}), [field]: val } };
    setInputs(m); storeInputs(program.id, m);
  };

  // ── Day list ──
  if (dayIdx === null) {
    return (
      <div className="app">
        <Logo onTripleTap={onAdminTap} />
        <div className="topbar">
          <BackBtn onClick={onBack} />
          <span className="page-title" style={{fontSize:18}}>{program.name.toUpperCase()}</span>
          <button className="btn btn-sm btn-ghost" onClick={() => copyToClipboard(shareUrl(program.id), () => setToast("Link copied!"))}>Share</button>
        </div>
        <div className="screen" style={{paddingTop:"0.875rem"}}>
          <p className="section-label">Training days</p>
          {days.length === 0 ? <p style={{color:"var(--muted)",fontSize:14}}>No days yet.</p>
          : days.map((d, di) => {
            const n = dayExCount(d);
            return (
              <button key={d.id} className="prog-btn" onClick={() => setDayIdx(di)}>
                <p style={{fontFamily:"var(--font-h)",fontSize:20,letterSpacing:"1.5px",marginBottom:4}}>{(d.name||("Day "+(di+1))).toUpperCase()}</p>
                <p style={{fontSize:12,color:"var(--muted)"}}>{n} exercise{n!==1?"s":""}</p>
              </button>
            );
          })}
        </div>
        {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      </div>
    );
  }

  // ── Day detail (warm up → workout → cool down) ──
  const day    = days[dayIdx] || { name:"", blocks:[] };
  const blocks = day.blocks || [];
  const warm = blocks.filter(b => b.type==="warmup");
  const main = blocks.filter(b => b.type==="solo" || b.type==="superset" || b.type==="triset");
  const cool = blocks.filter(b => b.type==="cooldown");
  const sections = [
    ["Warm Up", warm],
    ["Workout", main],
    ["Cool Down", cool],
  ].filter(([, list]) => list.length);

  return (
    <div className="app">
      <Logo onTripleTap={onAdminTap} />
      <div className="topbar">
        <BackBtn onClick={() => setDayIdx(null)} />
        <span className="page-title" style={{fontSize:18}}>{(day.name||("Day "+(dayIdx+1))).toUpperCase()}</span>
      </div>
      <div className="screen" style={{paddingTop:"0.875rem"}}>
        {sections.length === 0 ? <p style={{color:"var(--muted)",fontSize:14}}>Nothing in this day yet.</p>
        : sections.map(([title, list]) => (
          <div key={title} style={{marginBottom:"1.25rem"}}>
            <p className="section-label">{title}</p>
            {list.map(b => <ViewBlock key={b.id} b={b} inputs={inputs} onIn={handleIn} />)}
          </div>
        ))}
      </div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

// ─── CLIENT LOGIN ────────────────────────────────────────────────────────────
function Login({ onAuth, onAdminTap }) {
  const [name, setName] = useState("");
  const [pw, setPw]     = useState("");
  const [err, setErr]   = useState("");
  const [busy, setBusy] = useState(false);
  const attempt = async () => {
    if (!name.trim() || !pw) return;
    setBusy(true);
    const { data } = await sb.from("users").select("*").eq("name", name.trim()).eq("password", pw).limit(1);
    setBusy(false);
    if (data && data.length) onAuth(data[0]);
    else { setErr("Invalid name or password"); setTimeout(() => setErr(""), 1800); }
  };
  return (
    <div className="app">
      <Logo onTripleTap={onAdminTap} />
      <div className="screen" style={{paddingTop:"2rem"}}>
        <p className="section-label" style={{marginBottom:"1.5rem"}}>Sign in</p>
        <input value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key==="Enter"&&attempt()} placeholder="Name" style={{width:"100%",marginBottom:"0.625rem"}} autoFocus />
        <input type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key==="Enter"&&attempt()} placeholder="Password" style={{width:"100%",marginBottom:"0.875rem"}} />
        {err && <p style={{fontSize:12,color:"#cfcfcf",marginBottom:"0.875rem"}}>{err}</p>}
        <button className="btn btn-primary btn-full" onClick={attempt} disabled={busy||!name.trim()||!pw}>{busy?"Signing in...":"Sign in"}</button>
      </div>
    </div>
  );
}

// ─── ADMIN: gate ─────────────────────────────────────────────────────────────
function AdminGate({ onAuth, onCancel }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  const attempt = () => {
    if (pw === ADMIN_PASSWORD) onAuth();
    else { setErr(true); setPw(""); setTimeout(() => setErr(false), 1500); }
  };
  return (
    <div className="app">
      <Logo onTripleTap={() => {}} />
      <div className="screen" style={{paddingTop:"2rem"}}>
        <p className="section-label" style={{marginBottom:"1.5rem"}}>Admin access</p>
        <input type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key==="Enter"&&attempt()} placeholder="Password" style={{width:"100%",marginBottom:"0.875rem",borderColor:err?"#cfcfcf":undefined}} autoFocus />
        {err && <p style={{fontSize:12,color:"#cfcfcf",marginBottom:"0.875rem"}}>Wrong password</p>}
        <div style={{display:"flex",gap:8}}>

}

// ─── ADMIN: one editable block ────────────────────────────────────────────────
const ACOLS = "20px 46px 56px 42px 48px 1fr 22px";
function EditBlock({ b, bi, count, onChangeType, onMode, onField, onMove, onRemove, onUpdEx, onAddSet, onRmSet, onUpdSet }) {
  const wc = b.type==="warmup" || b.type==="cooldown";
  return (
    <div className="card">
      <div className="blk-head">
        <select value={b.type} onChange={e => onChangeType(e.target.value)} style={{padding:"5px 6px",fontSize:12}}>
          {BTYPES.map(t => <option key={t} value={t}>{BLABEL[t]}</option>)}
        </select>
        {wc && (
          <div style={{display:"flex",gap:4}}>
            <button className={"btn btn-sm"+(b.mode==="timed"?" btn-primary":"")} onClick={() => onMode("timed")}>Timed</button>
            <button className={"btn btn-sm"+(b.mode==="exercise"?" btn-primary":"")} onClick={() => onMode("exercise")}>Exercise</button>
          </div>
        )}
        <span style={{flex:1}} />
        <button className="btn btn-sm btn-ghost" onClick={() => onMove(-1)} disabled={bi===0} title="Move up">▲</button>
        <button className="btn btn-sm btn-ghost" onClick={() => onMove(1)} disabled={bi===count-1} title="Move down">▼</button>
        <button className="btn btn-sm btn-danger" onClick={onRemove}>✕</button>
      </div>

      {wc && b.mode==="timed" ? (
        <div className="timed-row">
          <input value={b.activity} onChange={e => onField("activity", e.target.value)} placeholder="Activity (e.g. Bike)" style={{flex:1}} />
          <input value={b.duration} onChange={e => onField("duration", e.target.value)} placeholder="Duration (e.g. 10 min)" style={{width:130}} />
        </div>
      ) : (
        b.exercises.map((ex, xi) => (
          <div key={ex.id} style={xi>0 ? {borderTop:"1px solid var(--border2)"} : null}>
            <div style={{padding:"0.625rem 1rem",display:"flex",alignItems:"center",gap:8}}>
              {(b.type==="superset"||b.type==="triset") && <span className="ex-tag">{["A","B","C"][xi]}</span>}
              <input className="plain-input" value={ex.name} onChange={e => onUpdEx(xi,"name",e.target.value)} placeholder="Exercise name" />
              <select value={ex.unit} onChange={e => onUpdEx(xi,"unit",e.target.value)} style={{width:54,padding:"5px 3px",fontSize:11}}>
                <option>kg</option><option>lbs</option>
              </select>
            </div>
            <div className="col-labels" style={{gridTemplateColumns:ACOLS}}>
              {["#","Reps","Tempo","RPE","RIR","Weight",""].map((h,i) => <span key={i} className="col-label">{h}</span>)}
            </div>
            {ex.sets.map((s, si) => (
              <div key={s.id} className="set-row" style={{gridTemplateColumns:ACOLS}}>
                <span style={{fontSize:13,color:"var(--accent)",fontFamily:"var(--font-h)",letterSpacing:1}}>{si+1}</span>
                <input type="number" className="mono" value={s.reps} onChange={e => onUpdSet(xi,si,"reps",parseInt(e.target.value)||0)} style={{width:"100%",padding:"5px 5px",fontSize:13,minWidth:0}} />
                <input className="mono" value={s.tempo} onChange={e => onUpdSet(xi,si,"tempo",e.target.value)} placeholder="3010" style={{width:"100%",padding:"5px 5px",fontSize:13,minWidth:0}} />
                <input className="mono" inputMode="numeric" value={s.rpe} onChange={e => onUpdSet(xi,si,"rpe",e.target.value.replace(/[^\d.]/g,'').slice(0,3))} placeholder="RPE" style={{width:"100%",padding:"5px 4px",fontSize:13,minWidth:0,textAlign:"center"}} />
                <input className="mono" value="" disabled placeholder="RIR" title="Entered by the athlete" style={{width:"100%",padding:"5px 4px",fontSize:12,minWidth:0,textAlign:"center"}} />
                <input className="mono" value="" disabled placeholder="Weight" title="Entered by the athlete" style={{width:"100%",padding:"5px 5px",fontSize:12,minWidth:0}} />
                <button onClick={() => onRmSet(xi,si)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:16,cursor:"pointer",padding:0,lineHeight:1}}>✕</button>
              </div>
            ))}
            <div style={{padding:"8px 1rem"}}>
              <button className="btn btn-sm" onClick={() => onAddSet(xi)}>+ Set</button>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

// ─── ADMIN: editor ───────────────────────────────────────────────────────────
function AdminEditor({ program, users, onSave, onCancel, saving }) {
  const mkDay = (n) => ({ id:uid(), name:"Day "+n, blocks:[mkBlock("solo")] });

  const [name, setName] = useState(program?.name||"");
  const [userId, setUserId] = useState(program?.user_id||"");
  const [days, setDays] = useState(() => (program?.days && program.days.length) ? program.days : [mkDay(1)]);
  const [toast, setToast] = useState(null);

  const setDay   = (di, fn)        => setDays(ds => ds.map((d,i)=> i===di ? fn(d) : d));
  const setBlock = (di, bi, fn)    => setDay(di, d => ({...d, blocks: d.blocks.map((b,i)=> i===bi ? fn(b) : b)}));
  const setEx    = (di, bi, xi, fn)=> setBlock(di, bi, b => ({...b, exercises: b.exercises.map((e,i)=> i===xi ? fn(e) : e)}));

  const addDay   = ()              => setDays(ds => [...ds, mkDay(ds.length+1)]);
  const rmDay    = (di)            => setDays(ds => ds.filter((_,i)=>i!==di));
  const addBlock = (di)            => setDay(di, d => ({...d, blocks:[...d.blocks, mkBlock("solo")]}));
  const rmBlock  = (di,bi)         => setDay(di, d => ({...d, blocks:d.blocks.filter((_,i)=>i!==bi)}));
  const moveBlock= (di,bi,dir)     => setDay(di, d => {
    const arr = d.blocks.slice(); const j = bi+dir;
    if (j<0 || j>=arr.length) return d;
    [arr[bi], arr[j]] = [arr[j], arr[bi]];
    return {...d, blocks:arr};
  });
  const changeType = (di,bi,t) => setBlock(di,bi, b => {
    const wc = t==="warmup" || t==="cooldown";
    const mode = wc ? "timed" : "exercise";
    return { ...b, type:t, mode, exercises: mode==="timed" ? [] : fitEx(b.exercises, EXCOUNT[t]) };
  });
  const setMode = (di,bi,mode) => setBlock(di,bi, b => ({
    ...b, mode, exercises: mode==="timed" ? [] : fitEx(b.exercises, EXCOUNT[b.type]||1),
  }));
  const updField = (di,bi,k,v)     => setBlock(di,bi, b => ({...b, [k]:v}));
  const updEx    = (di,bi,xi,k,v)  => setEx(di,bi,xi, e => ({...e, [k]:v}));
  const addSet   = (di,bi,xi)      => setEx(di,bi,xi, e => ({...e, sets:[...e.sets, mkSet(e.sets[e.sets.length-1])]}));
  const rmSet    = (di,bi,xi,si)   => setEx(di,bi,xi, e => ({...e, sets:e.sets.length>1 ? e.sets.filter((_,i)=>i!==si) : e.sets}));
  const updSet   = (di,bi,xi,si,k,v)=> setEx(di,bi,xi, e => ({...e, sets:e.sets.map((s,i)=> i===si ? {...s,[k]:v} : s)}));

  return (
    <div className="app">
      <Logo onTripleTap={() => {}} />
      <div className="topbar">
        <BackBtn onClick={onCancel} />
        <span className="page-title" style={{fontSize:18}}>{program ? "Edit" : "New Program"}</span>
        <div style={{display:"flex",gap:6}}>
          {program?.id && <button className="btn btn-sm" onClick={() => copyToClipboard(shareUrl(program.id), () => setToast("Link copied!"))}>Copy link</button>}
          <button className="btn btn-primary btn-sm" onClick={() => name.trim()&&userId&&onSave({id:program?.id||uid(),name:name.trim(),user_id:userId,days})} disabled={!name.trim()||!userId||saving}>
            {saving?"Saving...":"Save"}
          </button>
        </div>
      </div>
      <div className="screen" style={{paddingTop:"0.875rem"}}>
        <input className="big-input" style={{marginBottom:"0.625rem"}} value={name} onChange={e=>setName(e.target.value)} placeholder="Program name (e.g. Hypertrophy Block)" />
        <div style={{marginBottom:"1.25rem"}}>
          <p className="section-label" style={{marginBottom:"0.375rem"}}>Assigned to</p>
          <select value={userId} onChange={e=>setUserId(e.target.value)} style={{width:"100%",padding:"10px 12px",fontSize:14}}>
            <option value="">— Select a user —</option>
            {(users||[]).map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </div>
        <p style={{fontSize:11,color:"var(--muted)",marginBottom:"1.25rem",lineHeight:1.5}}>
          Set #, reps, tempo & RPE are set here. RIR &amp; weight are filled in by the athlete.
        </p>
        {days.map((day,di) => (
          <div className="day-block" key={day.id}>
            <div className="day-head">
              <input className="plain-input-head" style={{fontSize:22}} value={day.name} onChange={e=>setDay(di, d=>({...d,name:e.target.value}))} placeholder={"Day "+(di+1)} />
              <button className="btn btn-sm btn-danger" onClick={()=>{ if(confirm('Delete "'+(day.name||("Day "+(di+1)))+'"?')) rmDay(di); }}>Delete day</button>
            </div>
            {day.blocks.map((b,bi) => (
              <EditBlock
                key={b.id}
                b={b} bi={bi} count={day.blocks.length}
                onChangeType={(t) => changeType(di,bi,t)}
                onMode={(m) => setMode(di,bi,m)}
                onField={(k,v) => updField(di,bi,k,v)}
                onMove={(dir) => moveBlock(di,bi,dir)}
                onRemove={() => rmBlock(di,bi)}
                onUpdEx={(xi,k,v) => updEx(di,bi,xi,k,v)}
                onAddSet={(xi) => addSet(di,bi,xi)}
                onRmSet={(xi,si) => rmSet(di,bi,xi,si)}
                onUpdSet={(xi,si,k,v) => updSet(di,bi,xi,si,k,v)}
              />
            ))}
            <button className="btn btn-full" onClick={()=>addBlock(di)}>+ Block</button>
          </div>
        ))}
        <button className="btn btn-full btn-primary" onClick={addDay}>+ Day</button>
      </div>
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [programs, setPrograms]       = useState([]);
  const [users, setUsers]             = useState([]);
  const [loading, setLoading]         = useState(true);
  const [screen, setScreen]           = useState("loading");
  const [selected, setSelected]       = useState(null);
  const [editing, setEditing]         = useState(null);
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [currentUser, setCurrentUser] = useState(() => loadSession());
  const [saving, setSaving]           = useState(false);

  const fetchPrograms = async () => {
    const { data } = await sb.from("programs").select("*").order("created_at", { ascending: true });
    const list = (data || []).map(p => ({ ...p, days: normalizeDays(p) }));
    setPrograms(list);
    return list;
  };
  const fetchUsers = async () => {
    const { data } = await sb.from("users").select("*").order("created_at", { ascending: true });
    setUsers(data || []);
    return data || [];
  };

  useEffect(() => {
    const hash = window.location.hash.slice(1);
    Promise.all([fetchPrograms(), fetchUsers()]).then(([progs]) => {
      setLoading(false);
      const session = loadSession();
      if (!session) { setScreen("login"); return; }
      // Refresh session against DB so deleted/renamed users don't stay logged in.
      const owned = progs.filter(p => p.user_id === session.id);
      if (hash) {
        const found = owned.find(p => p.id === hash);
        if (found) { setSelected(found); setScreen("view"); return; }
        window.location.hash = "";
      }
      setScreen("home");
    });
  }, []);

  const goHome = () => { window.location.hash = ""; setScreen("home"); };

  const myPrograms = currentUser ? programs.filter(p => p.user_id === currentUser.id) : [];

  const handleSelect = (p) => { window.location.hash = p.id; setSelected(p); setScreen("view"); };

  const handleAdminTap = () => { if (adminAuthed) setScreen("admin-dash"); else setScreen("admin-gate"); };

  const handleSignIn = (u) => { storeSession(u); setCurrentUser(u); setScreen("home"); };
  const handleSignOut = () => { storeSession(null); setCurrentUser(null); window.location.hash = ""; setScreen("login"); };

  const handleSave = async (prog) => {
    setSaving(true);
    // The day/block structure is stored in the existing `exercises` JSONB column
    // so no Supabase schema migration is needed (normalizeDays reads it back).
    const payload = { id: prog.id, name: prog.name, user_id: prog.user_id, exercises: prog.days, updated_at: new Date().toISOString() };
    if (!editing) payload.created_at = new Date().toISOString();
    await sb.from("programs").upsert(payload, { onConflict: "id" });
    await fetchPrograms();
    setSaving(false); setEditing(null); setScreen("admin-dash");
  };

  const handleDelete = async (id) => {
    await sb.from("programs").delete().eq("id", id);
    setPrograms(prev => prev.filter(p => p.id !== id));
  };

  const handleDuplicate = async (p) => {
    const copy = {
      id: uid(),
      name: p.name + " (Copy)",
      user_id: p.user_id || null,
      exercises: p.days,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString(),
    };
    await sb.from("programs").insert(copy);
    await fetchPrograms();
  };

  const handleAddUser = async (name, password) => {
    const row = { id: uid(), name, password, created_at: new Date().toISOString() };
    const { error } = await sb.from("users").insert(row);
    if (error) return { err: error.message.includes("duplicate") ? "Name already taken" : error.message };
    await fetchUsers();
  };
  const handleUpdateUser = async (id, patch) => {
    await sb.from("users").update(patch).eq("id", id);
    await fetchUsers();
  };
  const handleDeleteUser = async (id) => {
    await sb.from("users").delete().eq("id", id);
    await sb.from("programs").update({ user_id: null }).eq("user_id", id);
    await fetchUsers();
    await fetchPrograms();
  };

  if (screen === "loading") return (
    <div className="loading-screen">
      <div style={{fontFamily:"var(--font-h)",fontSize:40,letterSpacing:5,color:"#fff"}}>Personal Lifts</div>
      <p style={{fontSize:10,color:"var(--dim)",letterSpacing:"4px",textTransform:"uppercase"}}>Loading</p>
    </div>
  );
  if (screen === "login") return <Login onAuth={handleSignIn} onAdminTap={handleAdminTap} />;
  if (screen === "admin-gate") return <AdminGate onAuth={() => { setAdminAuthed(true); setScreen("admin-dash"); }} onCancel={() => setScreen(currentUser ? "home" : "login")} />;
  if (screen === "admin-dash") return <AdminDash programs={programs} users={users} loading={loading} onEdit={p => { setEditing(p); setScreen("admin-edit"); }} onDelete={handleDelete} onDuplicate={handleDuplicate} onNew={() => { setEditing(null); setScreen("admin-edit"); }} onUsers={() => setScreen("admin-users")} onExit={() => setScreen(currentUser ? "home" : "login")} />;
  if (screen === "admin-users") return <UserAdmin users={users} loading={loading} onAdd={handleAddUser} onUpdate={handleUpdateUser} onDelete={handleDeleteUser} onBack={() => setScreen("admin-dash")} />;
  if (screen === "admin-edit") return <AdminEditor program={editing} users={users} onSave={handleSave} onCancel={() => setScreen("admin-dash")} saving={saving} />;
  if (screen === "view") return <ViewerProgram program={selected} onBack={goHome} onAdminTap={handleAdminTap} />;
  return <ViewerHome programs={myPrograms} loading={loading} currentUser={currentUser} onSelect={handleSelect} onAdminTap={handleAdminTap} onSignOut={handleSignOut} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
